<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nara Coffee</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
  overflow-x:hidden;
}

/* ===== HERO SLIDER ===== */
.hero{
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url("https://images.unsplash.com/photo-1442512595331-e89e73853f31") center/cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-size:56px;
  margin:0;
}

/* BUTTON */
.btn{
  padding:12px 18px;
  background:#6f4e37;
  border:none;
  color:white;
  margin:5px;
  cursor:pointer;
}

/* ===== SECTION ===== */
.section{
  padding:60px 40px;
}

/* MENU HORIZONTAL */
.menu-scroll{
  display:flex;
  overflow-x:auto;
  gap:15px;
  padding-bottom:10px;
}

.card{
  min-width:220px;
  background:rgba(255,255,255,0.05);
  padding:10px;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

/* GALLERY */
.gallery{
  column-count:3;
  column-gap:15px;
}

.gallery img{
  width:100%;
  margin-bottom:15px;
}

/* CART */
.cart-btn{
  position:fixed;
  top:20px;
  right:20px;
  background:#6f4e37;
  padding:10px;
  z-index:10;
}

.cart-panel{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:#111;
  padding:15px;
  display:none;
  overflow:auto;
}

input,textarea{
  width:100%;
  padding:8px;
  margin-top:8px;
  background:#222;
  color:white;
  border:none;
}
</style>
</head>

<body>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="toggleCart()">
Cart (<span id="count">0</span>)
</div>

<!-- HERO SLIDER (SIMPLE VERSION) -->
<section class="hero">
<div class="overlay"></div>
<div class="hero-content">
<h1>Nara Coffee</h1>
<p>Selamat Datang di Nara Coffee</p>

<button class="btn">Pesan Sekarang</button>
<button class="btn">Reservasi</button>
</div>
</section>

<!-- MENU -->
<section class="section">
<h2>Katalog Menu</h2>

<div class="menu-scroll" id="menu"></div>
</section>

<!-- GALLERY -->
<section class="section">
<h2>Gallery</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
<img src="https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb">
<img src="https://images.unsplash.com/photo-1521017432531-fbd92d768814">
</div>
</section>

<!-- ABOUT -->
<section class="section">
<h2>Tentang Nara Coffee</h2>
<p>
Nara Coffee adalah ruang tenang untuk menikmati kopi,
percakapan, dan waktu yang pelan di tengah hiruk pikuk kota.
</p>
</section>

<!-- RESERVATION -->
<section class="section">
<h2>Reservasi</h2>

<input placeholder="Nama">
<input placeholder="Jumlah Orang">
<input type="date">
<input type="time">
<textarea placeholder="Catatan"></textarea>

<button class="btn">Reservasi Sekarang</button>
</section>

<!-- CART -->
<div class="cart-panel" id="cart">

<h2>Cart</h2>
<div id="list"></div>

<h3 id="total">Total: 0</h3>

<input id="name" placeholder="Nama">
<input id="wa" placeholder="WA">
<textarea id="note" placeholder="Catatan"></textarea>

<button onclick="checkout()" class="btn">Checkout</button>
<button onclick="toggleCart()" class="btn">Tutup</button>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzJULBVG1bMjlXnSNdhaSjIJ7BwjGsxV1rHSoZzuB1-hi0mrEFoBo-jqXyUSgXD_1Y/exec"

let menu = []
let cart = []

// LOAD MENU
fetch(API)
.then(r=>r.json())
.then(d=>{
  menu = d
  render()
})

function render(){
  let el = document.getElementById("menu")
  el.innerHTML=""

  menu.forEach((m,i)=>{
    el.innerHTML += `
    <div class="card">
      <img src="${m.gambar}">
      <h3>${m.nama}</h3>
      <p>${m.harga}</p>
      <button onclick="add(${i})">+</button>
    </div>`
  })
}

// CART
function add(i){
  let item = menu[i]

  let exist = cart.find(x=>x.nama===item.nama)

  if(exist) exist.qty++
  else cart.push({...item, qty:1})

  update()
}

function update(){
  document.getElementById("count").innerText = cart.length

  let el = document.getElementById("list")
  el.innerHTML=""

  let total=0

  cart.forEach(i=>{
    total += parseInt(i.harga.replace(/\D/g,''))*i.qty

    el.innerHTML += `
      <div>${i.nama} x ${i.qty}</div>
    `
  })

  document.getElementById("total").innerText="Total: "+total
}

function toggleCart(){
  let c = document.getElementById("cart")
  c.style.display = c.style.display==="block"?"none":"block"
}

// CHECKOUT
function checkout(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      name:document.getElementById("name").value,
      wa:document.getElementById("wa").value,
      note:document.getElementById("note").value,
      cart,
      total:cart.length
    })
  })

  alert("Order masuk")
  cart=[]
  update()
  toggleCart()
}

</script>

</body>
</html>
