<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nara Coffee</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:sans-serif;
      background:#0f0f0f;
      color:white;
    }

    header {
      text-align:center;
      padding:30px;
      font-size:28px;
      font-weight:bold;
    }

    .menu {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:10px;
      padding:10px;
    }

    .card {
      background:#1a1a1a;
      padding:10px;
      border-radius:8px;
    }

    img {
      width:100%;
      height:120px;
      object-fit:cover;
      border-radius:6px;
    }

    button {
      width:100%;
      padding:8px;
      margin-top:8px;
      background:#6f4e37;
      color:white;
      border:none;
      cursor:pointer;
    }

    .cart {
      position:fixed;
      right:10px;
      top:10px;
      background:#6f4e37;
      padding:10px;
      cursor:pointer;
    }

    .panel {
      position:fixed;
      right:0;
      top:0;
      width:100%;
      max-width:400px;
      height:100%;
      background:black;
      padding:15px;
      overflow:auto;
      display:none;
    }

    input, textarea {
      width:100%;
      padding:8px;
      margin-top:5px;
      background:#222;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<div class="cart" onclick="toggleCart()">
  Cart (<span id="count">0</span>)
</div>

<header>Nara Coffee</header>

<div class="menu" id="menu"></div>

<div class="panel" id="panel">

  <h3>Cart</h3>
  <div id="cart"></div>

  <hr>

  <input id="name" placeholder="Nama">
  <input id="wa" placeholder="WhatsApp">
  <textarea id="note" placeholder="Catatan"></textarea>

  <button onclick="checkout()">Checkout</button>
  <button onclick="toggleCart()">Tutup</button>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJULBVG1bMjlXnSNdhaSjIJ7BwjGsxV1rHSoZzuB1-hi0mrEFoBo-jqXyUSgXD_1Y/exec"

let menu = []
let cart = []

async function loadMenu(){
  const res = await fetch(SCRIPT_URL)
  menu = await res.json()
  renderMenu()
}

function renderMenu(){
  const el = document.getElementById("menu")
  el.innerHTML = ""

  menu.forEach((item,index)=>{
    el.innerHTML += `
      <div class="card">
        <img src="${item.gambar}">
        <h4>${item.nama}</h4>
        <p>${item.harga}</p>
        <button onclick='add(${index})'>Tambah</button>
      </div>
    `
  })
}

function add(i){
  let item = menu[i]

  let exist = cart.find(x=>x.nama===item.nama)

  if(exist){
    exist.qty++
  } else {
    cart.push({...item, qty:1})
  }

  renderCart()
}

function renderCart(){
  document.getElementById("count").innerText = cart.length

  let el = document.getElementById("cart")
  el.innerHTML = ""

  cart.forEach((item,i)=>{
    el.innerHTML += `
      <div>
        ${item.nama} x ${item.qty}
      </div>
    `
  })
}

function toggleCart(){
  let p = document.getElementById("panel")
  p.style.display = p.style.display==="block" ? "none" : "block"
}

function checkout(){

  let name = document.getElementById("name").value
  let wa = document.getElementById("wa").value
  let note = document.getElementById("note").value

  if(!name || !wa || cart.length===0){
    alert("Isi data & cart kosong")
    return
  }

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      name,
      wa,
      note,
      cart,
      total:cart.length,
      type:"order"
    })
  })

  alert("Order masuk!")

  cart = []
  renderCart()
  toggleCart()
}

loadMenu()

</script>

</body>
</html>
