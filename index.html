<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nara Coffee | Premium Bakery & Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #2D3E2E; /* Hijau tua seperti di gambar */
            --accent-brown: #BC8A5F; /* Cokelat emas */
            --bg-cream: #F9F5F0;     /* Krem lembut */
            --text-main: #333333;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-cream);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        /* ===== NAVIGATION ===== */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: var(--primary-dark);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            letter-spacing: 2px;
        }

        nav .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            display: flex;
            height: 90vh;
            background: var(--primary-dark);
            color: white;
            align-items: center;
            padding: 0 8%;
            overflow: hidden;
        }

        .hero-text {
            flex: 1;
            padding-right: 50px;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero-image {
            flex: 1;
            height: 80%;
            background: url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80') center/cover;
            border-radius: 20px;
            box-shadow: 20px 20px 0px var(--accent-brown);
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-primary { background: var(--accent-brown); color: white; margin-right: 10px; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* ===== MENU SECTION ===== */
        .section-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            margin: 60px 0 40px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 8% 60px;
        }

        .menu-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            position: relative;
        }

        .menu-card:hover { transform: translateY(-10px); }

        .menu-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .menu-info { padding: 20px; }
        .menu-info h3 { margin: 0 0 10px; font-family: 'Playfair Display', serif; }
        .menu-info p { color: var(--accent-brown); font-weight: 600; font-size: 18px; }

        .add-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--primary-dark);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* ===== CART PANEL ===== */
        .cart-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            z-index: 2000;
            padding: 30px;
            transition: 0.5s;
        }

        .cart-panel.active { right: 0; }

        /* Responsif */
        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; padding-top: 40px; }
            .hero-text h1 { font-size: 40px; }
            .hero-image { width: 100%; height: 300px; margin-top: 30px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">NARA COFFEE</div>
    <div class="nav-links">
        <a href="#menu">Menu</a>
        <a href="#" onclick="toggleCart()">Cart (<span id="count">0</span>)</a>
    </div>
</nav>

<section class="hero">
    <div class="hero-text">
        <h1>Fresh Coffee & Pastries, Every Day</h1>
        <p>Nikmati perpaduan biji kopi pilihan dan roti panggang hangat dalam suasana yang tenang.</p>
        <div style="margin-top: 30px;">
            <button class="btn btn-primary" onclick="scrollMenu()">Pesan Sekarang</button>
            <button class="btn btn-outline" onclick="wa()">Reservasi Table</button>
        </div>
    </div>
    <div class="hero-image"></div>
</section>

<section id="menu">
    <h2 class="section-title">Menu Highlights</h2>
    <div class="menu-grid" id="menuGrid">
        </div>
</section>

<div class="cart-panel" id="cartBox">
    <h2 style="font-family: 'Playfair Display';">Keranjang Anda</h2>
    <hr>
    <div id="list" style="margin: 20px 0;"></div>
    <h3>Total: <span id="total" style="color: var(--accent-brown);">0</span></h3>
    <button class="btn btn-primary" style="width: 100%;" onclick="confirmOrder()">Checkout Via WhatsApp</button>
    <button class="btn btn-outline" style="width: 100%; color: #333; border-color: #ccc; margin-top: 10px;" onclick="toggleCart()">Kembali</button>
</div>

<script>
    let menu = [];
    let cart = [];

    // URL Google Apps Script kamu
    const API_URL = "https://script.google.com/macros/s/AKfycbzJULBVG1bMjlXnSNdhaSjIJ7BwjGsxV1rHSoZzuB1-hi0mrEFoBo-jqXyUSgXD_1Y/exec";

    fetch(API_URL)
    .then(r => r.json())
    .then(d => {
        menu = d;
        render();
    });

    function render() {
        let el = document.getElementById("menuGrid");
        el.innerHTML = "";
        menu.forEach((m, i) => {
            el.innerHTML += `
            <div class="menu-card">
                <img src="${m.gambar || 'https://via.placeholder.com/300'}">
                <div class="menu-info">
                    <h3>${m.nama}</h3>
                    <p>Rp ${m.harga}</p>
                    <button class="add-btn" onclick="add(${i})">+</button>
                </div>
            </div>`;
        });
    }

    function add(i) {
        let item = menu[i];
        let exist = cart.find(x => x.nama === item.nama);
        if(exist) exist.qty++;
        else cart.push({...item, qty: 1});
        update();
        if(!document.getElementById("cartBox").classList.contains("active")) toggleCart();
    }

    function update() {
        document.getElementById("count").innerText = cart.length;
        let el = document.getElementById("list");
        el.innerHTML = "";
        let total = 0;
        cart.forEach(i => {
            let hargaAngka = parseInt(i.harga.replace(/\D/g,''));
            total += hargaAngka * i.qty;
            el.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>${i.nama} (x${i.qty})</span>
                <span>Rp ${hargaAngka * i.qty}</span>
            </div>`;
        });
        document.getElementById("total").innerText = "Rp " + total.toLocaleString();
    }

    function toggleCart() {
        document.getElementById("cartBox").classList.toggle("active");
    }

    function confirmOrder() {
        if(cart.length === 0) return alert("Keranjang masih kosong!");
        
        let pesan = "Halo Nara Coffee, saya mau pesan:%0A";
        cart.forEach(i => {
            pesan += `- ${i.nama} x ${i.qty}%0A`;
        });
        pesan += `%0ATotal: ${document.getElementById("total").innerText}`;
        
        window.open(`https://wa.me/6280000000000?text=${pesan}`);
    }

    function scrollMenu() {
        document.getElementById("menu").scrollIntoView({behavior: "smooth"});
    }

    function wa() {
        window.open("https://wa.me/6280000000000?text=Halo%20Nara%20Coffee,%20saya%20ingin%20reservasi%20tempat.");
    }
</script>
</body>
</html>
